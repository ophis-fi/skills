# Scanner-visibility mirror of the repo-root HOL plugin scanner workflow.
# GitHub only discovers workflows under the repository-root .github/workflows,
# so this nested copy never executes as an Action. It exists so the HOL plugin
# scanner, which resolves workflow files relative to the plugin dir
# (plugins/ophis), can credit action pinning. Keep it in sync with the root.
name: HOL Plugin Scanner

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: HOL Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@6907377fe3d83dcd305ffd1e885b15911853467b # v1.2.372
        with:
          plugin_dir: "."
          mode: scan
          min_score: 80
          fail_on_severity: high
          format: sarif
          upload_sarif: true
